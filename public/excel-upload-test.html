<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excel Upload Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
            border-bottom: 2px solid #007bff;
            padding-bottom: 10px;
        }
        .input-group {
            margin: 20px 0;
        }
        label {
            display: block;
            margin-bottom: 10px;
            font-weight: bold;
            color: #333;
        }
        input[type="file"] {
            display: block;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            width: 100%;
            cursor: pointer;
        }
        input[type="file"]:hover {
            border-color: #007bff;
            background: #f9f9f9;
        }
        button {
            background: #007bff;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
        }
        button:hover {
            background: #0056b3;
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 4px;
            font-weight: bold;
        }
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        .drag-area {
            border: 2px dashed #007bff;
            border-radius: 4px;
            padding: 40px;
            text-align: center;
            margin: 20px 0;
            background: #f9f9f9;
        }
        .drag-area.over {
            background: #e3f2fd;
            border-color: #0056b3;
        }
        #status {
            white-space: pre-wrap;
            font-family: monospace;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Excel Upload Test Page</h1>

        <div class="input-group">
            <label for="file-input">Select Excel File (.xlsx, .xls, .csv):</label>
            <input
                type="file"
                id="file-input"
                accept=".xlsx,.xls,.csv"
            />
        </div>

        <div class="drag-area" id="drag-area">
            <p>Or drag and drop your Excel file here</p>
        </div>

        <button id="upload-btn" onclick="uploadFile()">Upload File</button>

        <div id="message"></div>
        <div id="status"></div>
    </div>

    <script>
        const fileInput = document.getElementById('file-input');
        const dragArea = document.getElementById('drag-area');
        const messageDiv = document.getElementById('message');
        const statusDiv = document.getElementById('status');
        const uploadBtn = document.getElementById('upload-btn');

        const API_URL = 'http://localhost:8000';

        // Drag and drop
        dragArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            dragArea.classList.add('over');
            logStatus('Drag detected - over drop zone');
        });

        dragArea.addEventListener('dragleave', () => {
            dragArea.classList.remove('over');
        });

        dragArea.addEventListener('drop', (e) => {
            e.preventDefault();
            dragArea.classList.remove('over');
            if (e.dataTransfer.files && e.dataTransfer.files[0]) {
                fileInput.files = e.dataTransfer.files;
                logStatus('File selected via drag-drop: ' + e.dataTransfer.files[0].name);
            }
        });

        // File input change
        fileInput.addEventListener('change', (e) => {
            if (e.target.files && e.target.files[0]) {
                logStatus('File selected: ' + e.target.files[0].name + ' (' + (e.target.files[0].size / 1024).toFixed(2) + ' KB)');
            }
        });

        function logStatus(msg) {
            const timestamp = new Date().toLocaleTimeString();
            statusDiv.textContent += `[${timestamp}] ${msg}\n`;
            statusDiv.scrollTop = statusDiv.scrollHeight;
        }

        async function uploadFile() {
            if (!fileInput.files || !fileInput.files[0]) {
                showMessage('Please select a file first', 'error');
                return;
            }

            const file = fileInput.files[0];
            logStatus(`Starting upload: ${file.name}`);

            const formData = new FormData();
            formData.append('file', file);

            try {
                uploadBtn.disabled = true;
                showMessage('Uploading...', 'info');
                logStatus('Sending request to: ' + API_URL + '/api/calls/bulk-upload');

                const response = await fetch(API_URL + '/api/calls/bulk-upload', {
                    method: 'POST',
                    body: formData,
                });

                logStatus('Response status: ' + response.status + ' ' + response.statusText);

                if (!response.ok) {
                    const error = await response.text();
                    logStatus('Error response: ' + error);
                    showMessage(`Upload failed: ${response.statusText}`, 'error');
                    return;
                }

                const data = await response.json();
                logStatus('Upload successful! Response: ' + JSON.stringify(data, null, 2));

                showMessage(
                    `Success! Processed ${data.valid_rows} rows\nBatch ID: ${data.batch_id}`,
                    'success'
                );
            } catch (error) {
                logStatus('Error: ' + error.message);
                showMessage(`Error: ${error.message}`, 'error');
            } finally {
                uploadBtn.disabled = false;
            }
        }

        function showMessage(msg, type) {
            messageDiv.textContent = msg;
            messageDiv.className = 'message ' + type;
        }

        // Initial status
        logStatus('Page loaded. Ready for file selection.');
        logStatus('API URL: ' + API_URL);
    </script>
</body>
</html>
