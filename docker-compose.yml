version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: dietician_qa_user
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: dietician_qa
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dietician_qa_user -d dietician_qa"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  celery-worker:
    build: .
    command: celery -A app.worker.celery_app worker --loglevel=info --concurrency=10
    environment:
      DATABASE_URL: postgresql://dietician_qa_user:password123@postgres:5432/dietician_qa
      REDIS_URL: redis://redis:6379/0
      GOOGLE_APPLICATION_CREDENTIALS: /app/service_account.json
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      LLM_PROVIDER: gemini
      TRANSCRIPTION_PROVIDER: google_stt
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app/app

volumes:
  postgres_data:
